services:
  zimacompare:
    container_name: zimacompare-v7
    image: nginx:latest
    restart: unless-stopped
    ports:
      - target: 80
        published: "8503"
        protocol: tcp
    x-casaos:
      ports:
        - container: "80"
          description:
            en_us: Web UI

x-casaos:
  architectures:
    - amd64
  main: zimacompare
  author: musitoul-blip
  category: File Sync
  description:
    en_us: Minimal test app (nginx) to diagnose the install button.
  tagline:
    en_us: diagnostic test
  title:
    custom: ""
    en_us: ZimaCompare v7
  icon: ""
  index: /
  port_map: "8503"
  scheme: http
  hostname: ""
  is_uncontrolled: false
  store_app_id: zimacompare-v7
